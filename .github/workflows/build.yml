name: Build RSDKv3 Android Unlocked Only

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  v3-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Core Audio Dependencies
        run: |
          mkdir -p dependencies/android
          cd dependencies/android
          curl -L "https://osuosl.org" -o libvorbis.zip && unzip libvorbis.zip && mv libvorbis-1.3.7 libvorbis
          curl -L "https://osuosl.org" -o libogg.zip && unzip libogg.zip && mv libogg-1.3.5 libogg
          curl -L "https://osuosl.org" -o libtheora.zip && unzip libtheora.zip && mv libtheora-1.1.1 libtheora
          curl -L "https://github.com" -o GLEW.zip && unzip GLEW.zip && mv glew-2.2.0 glew
          cd ../../
          
          mkdir -p android/app/jni/dependencies/android
          cd android/app/jni/dependencies/android
          curl -L "https://libsdl.org" -o SDL2.zip && unzip SDL2.zip && mv SDL2-2.28.3 SDL
          cd ../../../../

      - name: Fix Directory Junction Symlinks
        run: |
          cd android/app/jni
          rm -rf src SDL
          ln -s ../../../ src
          ln -s dependencies/android/SDL SDL
          cd ../../../

      - name: Build Android APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -PABIFILTERS="armeabi-v7a;arm64-v8a"

      - name: Upload Unlocked Android APK
        uses: actions/upload-artifact@v4
        with:
          name: SonicCD-Android-Unlocked
          path: android/app/build/outputs/apk/debug/*.apk

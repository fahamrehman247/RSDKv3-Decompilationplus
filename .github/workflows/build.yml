name: Build Win64 Unlocked

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Configure CMake
      run: |
        cmake -B build -G "Visual Studio 17 2022" -A x64 `
          -DRETRO_DISABLE_PLUS=OFF `
          -DRSDK_AUTOBUILD=OFF

    - name: Build Project
      run: cmake --build build --config Release

    - name: Upload Win64 Executable
      uses: actions/artifacts@v4
      with:
        name: SonicCD-Win64-Unlocked
        path: build/Release/SonicCD.exe
